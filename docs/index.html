<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveBook</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
            color: #0f172a;
        }

        .page-shell {
            width: min(960px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .brand-bar {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            border: 1px solid #d9e3f5;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
        }

        .brand-bar img {
            width: 28px;
            height: 28px;
            display: block;
            object-fit: contain;
        }

        .brand-bar span {
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .content-card {
            margin-top: 28px;
            padding: 32px;
            border: 1px solid #d9e3f5;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: #475569;
        }

        @media (max-width: 640px) {
            .page-shell {
                width: min(100% - 24px, 960px);
                padding-top: 20px;
            }

            .content-card {
                padding: 24px;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <div class="brand-bar">
            <img src="../savebook/public/savebook.png" alt="SaveBook logo">
            <span>SaveBook</span>
        </div>
        <section class="content-card">
            <h1>SaveBook Documentation</h1>
            <p>The docs page now includes the SaveBook logo so the brand stays visible alongside the app experience.</p>
        </section>
    </main>
</body>
</html>
